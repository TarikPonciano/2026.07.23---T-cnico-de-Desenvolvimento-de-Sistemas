<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteio Maio - Técnico em Desenvolvimento de Sistemas - 2026.07.23</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bungee&family=Outfit:wght@300;400;600;800&display=swap');

:root{
  --bg:#0a0613;
  --gold:#ffd24a;
  --gold2:#ffb01f;
  --pink:#ff2e87;
  --cyan:#2ee6ff;
  --violet:#a36bff;
  --panel:rgba(255,255,255,.04);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(163,107,255,.25), transparent 45%),
    radial-gradient(circle at 85% 15%, rgba(255,46,135,.22), transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(46,230,255,.18), transparent 50%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;opacity:.04;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px);
}
.wrap{position:relative;z-index:2;max-width:1000px;margin:0 auto;padding:40px 24px 80px}

header{text-align:center;margin-bottom:36px}
h1{
  font-family:'Bungee',cursive;
  font-size:clamp(2.2rem,7vw,4.4rem);
  line-height:1;
  background:linear-gradient(90deg,var(--gold),var(--pink),var(--cyan),var(--gold));
  background-size:300% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shimmer 6s linear infinite;
  letter-spacing:1px;
}
@keyframes shimmer{to{background-position:300% 0}}
.sub{margin-top:10px;color:#a99fc6;font-weight:300;letter-spacing:3px;text-transform:uppercase;font-size:.8rem}

.drop{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  border:2px dashed rgba(255,210,74,.4);
  border-radius:20px;
  background:var(--panel);
  padding:46px 24px;text-align:center;cursor:pointer;
  transition:.25s;backdrop-filter:blur(8px);
}
.drop:hover,.drop.over{border-color:var(--gold);background:rgba(255,210,74,.07);transform:translateY(-2px)}
.drop .ic{font-size:3rem;line-height:1}
.drop p{color:#cfc6e6;margin:0}
.drop small{color:#7d7398;display:block;max-width:90%}
input[type=file]{display:none}

.pool{margin-top:34px;display:none}
.pool.show{display:block;animation:fadeUp .5s}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.poolhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.poolhead h2{font-family:'Bungee';font-size:1.1rem;color:var(--gold)}
.poolhead .meta{color:#a99fc6;font-size:.85rem}

.btn{
  font-family:'Bungee';font-size:1.05rem;border:none;cursor:pointer;color:#1a0e2e;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  padding:16px 38px;border-radius:50px;letter-spacing:1px;
  box-shadow:0 0 0 0 rgba(255,210,74,.6);transition:.2s;
}
.btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 10px 30px -6px rgba(255,176,31,.6)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn.reset{background:linear-gradient(135deg,var(--violet),var(--pink));color:#fff;font-size:.8rem;padding:12px 24px}

.draw-bar{text-align:center;margin:30px 0}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.card{
  position:relative;background:var(--panel);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:14px 16px;backdrop-filter:blur(6px);transition:.4s;overflow:hidden;
}
.card .nm{font-weight:600;font-size:1.02rem}
.card .tk{margin-top:4px;font-size:.78rem;color:var(--cyan);letter-spacing:.5px}
.card .bar{margin-top:8px;height:5px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden}
.card .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink))}
.card.out{opacity:.18;filter:grayscale(.8);transform:scale(.96)}
.card.out .nm{text-decoration:line-through}

/* slot machine overlay */
.stage{
  position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;flex-direction:column;
  background:rgba(6,3,15,.86);backdrop-filter:blur(10px);
}
.stage.show{display:flex;animation:fadeUp .3s}
.reel{
  font-family:'Bungee';font-size:clamp(2rem,9vw,5rem);
  background:linear-gradient(90deg,var(--cyan),var(--pink),var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  min-height:1.2em;text-align:center;padding:0 16px;
}
.reel.rolling{animation:flick .07s steps(1) infinite}
@keyframes flick{50%{opacity:.35;transform:translateY(-6px) skewX(-4deg)}}
.winner-label{font-family:'Bungee';color:var(--gold);letter-spacing:4px;font-size:1rem;margin-bottom:14px;opacity:0}
.winner-label.show{opacity:1;animation:pop .5s}
@keyframes pop{0%{transform:scale(.4)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.reel.win{animation:winpulse 1.2s ease infinite}
@keyframes winpulse{50%{filter:drop-shadow(0 0 24px rgba(255,210,74,.8))}}
.stage .actions{margin-top:34px;display:none;gap:14px}
.stage .actions.show{display:flex;flex-wrap:wrap;justify-content:center}

.confetti{position:fixed;width:10px;height:14px;top:-20px;z-index:60;pointer-events:none;border-radius:2px}

.winners{margin-top:34px;display:none}
.winners.show{display:block}
.winners h3{font-family:'Bungee';color:var(--gold);font-size:.95rem;margin-bottom:12px}
.wlist{display:flex;flex-direction:column;gap:8px}
.wrow{display:flex;align-items:center;gap:14px;background:linear-gradient(90deg,rgba(255,210,74,.12),transparent);border-left:3px solid var(--gold);padding:10px 16px;border-radius:8px;animation:fadeUp .4s}
.wrow .rank{font-family:'Bungee';color:var(--gold);min-width:32px}
.wrow .wnm{font-weight:600}
.wrow .wtk{margin-left:auto;color:#a99fc6;font-size:.8rem}
.empty{text-align:center;color:#7d7398;padding:30px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Sorteio Ponderado</h1>
    <div class="sub">cada ponto vale um ticket</div>
  </header>

  <label class="drop" id="drop">
    <div class="ic">🎰</div>
    <p><strong>Arraste</strong> ou clique para enviar o arquivo <strong>.xlsx</strong></p>
    <small>O sorteio usa a coluna "Total" como quantidade de tickets</small>
    <input type="file" id="file" accept=".xlsx,.xls">
  </label>

  <section class="pool" id="pool">
    <div class="poolhead">
      <h2>Participantes</h2>
      <span class="meta" id="meta"></span>
    </div>
    <div class="draw-bar">
      <button class="btn" id="drawBtn">🎲 Sortear</button>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <section class="winners" id="winners">
    <h3>🏆 Ordem dos Sorteados</h3>
    <div class="wlist" id="wlist"></div>
  </section>
</div>

<div class="stage" id="stage">
  <div class="winner-label" id="wlabel">🎉 Sorteado 🎉</div>
  <div class="reel" id="reel"></div>
  <div class="actions" id="actions">
    <button class="btn" id="again">Sortear Próximo</button>
    <button class="btn reset" id="close">Voltar</button>
  </div>
</div>

<script>
let pool=[];      // {name, tickets, out}
let winners=[];
const $=id=>document.getElementById(id);

/* ---- Áudio: rufar de tambores + virada sintetizados ---- */
let AC=null;
function ac(){if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC}

function drumHit(t,gain=0.55){
  const c=ac();
  // membrana (corpo do tambor)
  const o=c.createOscillator(),g=c.createGain();
  o.type='sine';o.frequency.setValueAtTime(170,t);o.frequency.exponentialRampToValueAtTime(60,t+0.12);
  g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
  o.connect(g).connect(c.destination);o.start(t);o.stop(t+0.18);
  // ruído (pele/baqueta)
  const buf=c.createBuffer(1,c.sampleRate*0.05,c.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  const n=c.createBufferSource(),ng=c.createGain();n.buffer=buf;
  ng.gain.setValueAtTime(gain*0.5,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.05);
  n.connect(ng).connect(c.destination);n.start(t);
}

let rollSource=null;
function startRoll(durationMs){
  const c=ac(),now=c.currentTime,dur=durationMs/1000;
  // rufar acelerando: intervalos que encurtam ao longo do tempo
  let t=now,interval=0.13;
  const end=now+dur;
  while(t<end){
    const prog=(t-now)/dur;            // 0 -> 1
    drumHit(t,0.30+prog*0.25);
    interval=0.13-prog*0.085;          // de 130ms até ~45ms (aceleração)
    t+=Math.max(interval,0.045);
  }
}
function crash(){
  const c=ac(),t=c.currentTime;
  // batida final forte
  drumHit(t,0.8);
  // prato/címbalo
  const buf=c.createBuffer(1,c.sampleRate*1.2,c.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.4);
  const n=c.createBufferSource(),ng=c.createGain(),f=c.createBiquadFilter();
  n.buffer=buf;f.type='highpass';f.frequency.value=4000;
  ng.gain.setValueAtTime(0.5,t);ng.gain.exponentialRampToValueAtTime(0.001,t+1.1);
  n.connect(f).connect(ng).connect(c.destination);n.start(t);
  // acorde de vitória
  [523.25,659.25,783.99].forEach((fr,i)=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='triangle';o.frequency.value=fr;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.18,t+0.04);g.gain.exponentialRampToValueAtTime(0.001,t+0.9);
    o.connect(g).connect(c.destination);o.start(t);o.stop(t+1);
  });
}


const drop=$('drop'),fileIn=$('file');
['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('over')}));
['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('over')}));
drop.addEventListener('drop',ev=>{if(ev.dataTransfer.files.length)handleFile(ev.dataTransfer.files[0])});
fileIn.addEventListener('change',e=>{if(e.target.files.length)handleFile(e.target.files[0])});

function handleFile(file){
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      const nameKey=Object.keys(rows[0]).find(k=>/nome/i.test(k))||Object.keys(rows[0])[0];
      const totalKey=Object.keys(rows[0]).find(k=>/total/i.test(k));
      if(!totalKey){alert('Não encontrei a coluna "Total".');return}
      pool=rows.map(rw=>({name:String(rw[nameKey]).trim(),tickets:Number(rw[totalKey])||0,out:false}))
               .filter(p=>p.name&&p.tickets>0);
      winners=[];
      render();
    }catch(err){alert('Erro ao ler o arquivo: '+err.message)}
  };
  r.readAsArrayBuffer(file);
}

function render(){
  $('pool').classList.add('show');
  const active=pool.filter(p=>!p.out);
  const max=Math.max(...pool.map(p=>p.tickets));
  $('meta').textContent=`${active.length} restantes · ${active.reduce((s,p)=>s+p.tickets,0)} tickets em jogo`;
  $('grid').innerHTML=pool.map(p=>`
    <div class="card ${p.out?'out':''}">
      <div class="nm">${p.name}</div>
      <div class="tk">🎟 ${p.tickets} tickets</div>
      <div class="bar"><i style="width:${p.tickets/max*100}%"></i></div>
    </div>`).join('');
  $('drawBtn').disabled=active.length===0;
  if(active.length===0&&pool.length){$('drawBtn').textContent='✓ Todos sorteados'}
  else{$('drawBtn').textContent='🎲 Sortear'}
  renderWinners();
}

function renderWinners(){
  if(!winners.length){$('winners').classList.remove('show');return}
  $('winners').classList.add('show');
  $('wlist').innerHTML=winners.map((w,i)=>`
    <div class="wrow">
      <span class="rank">${i+1}º</span>
      <span class="wnm">${w.name}</span>
      <span class="wtk">${w.tickets} tickets</span>
    </div>`).join('');
}

function weightedPick(){
  const active=pool.filter(p=>!p.out);
  const total=active.reduce((s,p)=>s+p.tickets,0);
  let r=Math.random()*total;
  for(const p of active){if((r-=p.tickets)<0)return p}
  return active[active.length-1];
}

$('drawBtn').addEventListener('click',startDraw);
$('again').addEventListener('click',()=>{closeStage();setTimeout(startDraw,250)});
$('close').addEventListener('click',closeStage);

function startDraw(){
  const active=pool.filter(p=>!p.out);
  if(!active.length)return;
  const winner=weightedPick();
  const stage=$('stage'),reel=$('reel'),wlabel=$('wlabel'),actions=$('actions');
  stage.classList.add('show');
  reel.className='reel rolling';wlabel.classList.remove('show');actions.classList.remove('show');
  reel.textContent='';
  let t=0,dur=2600,step=70;
  startRoll(dur);
  const spin=setInterval(()=>{
    reel.textContent=active[Math.floor(Math.random()*active.length)].name.toUpperCase();
    t+=step;
    if(t>=dur){
      clearInterval(spin);
      crash();
      reel.className='reel win';
      reel.textContent=winner.name.toUpperCase();
      wlabel.classList.add('show');
      actions.classList.add('show');
      burst();
      winner.out=true;winners.push(winner);
      render();
      if(!pool.filter(p=>!p.out).length){$('again').style.display='none'}
      else{$('again').style.display=''}
    }
  },step);
}
function closeStage(){$('stage').classList.remove('show')}

function burst(){
  const cols=['#ffd24a','#ff2e87','#2ee6ff','#a36bff','#fff'];
  for(let i=0;i<140;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=cols[i%cols.length];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const dx=(Math.random()-.5)*300,fall=window.innerHeight+40,rot=Math.random()*720;
    c.animate([
      {transform:`translate(0,0) rotate(0)`,opacity:1},
      {transform:`translate(${dx}px,${fall}px) rotate(${rot}deg)`,opacity:0}
    ],{duration:1800+Math.random()*1200,easing:'cubic-bezier(.2,.6,.4,1)'}).onfinish=()=>c.remove();
  }
}
</script>
</body>
</html>
